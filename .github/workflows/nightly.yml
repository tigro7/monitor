name: 🌙 Nightly Project Monitor

on:
  schedule:
    # Ogni notte in settimana alle 02:00 UTC (04:00 ora italiana in estate, 03:00 in inverno)
    - cron: "0 2 * * 1-5"
  # Permette di lanciarlo manualmente dalla UI di GitHub per testarlo
  workflow_dispatch:

# Permessi minimi a livello di workflow — ogni job può restringerli ulteriormente
permissions:
  contents: read

jobs:
  run-monitor:
    name: Analizza progetti e invia report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Permessi espliciti minimi per questo job:
    # - contents:write  → per committare seen-suggestions.json
    # - actions:read    → richiesto implicitamente da alcune action
    permissions:
      contents: write

    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        # SHA verificabile su: https://github.com/actions/checkout/releases/tag/v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        # actions/setup-node v4.4.0
        # SHA verificabile su: https://github.com/actions/setup-node/releases/tag/v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run agent
        id: run_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REPO_MONITOR: ${{ github.repository }}
          DISMISS_API_URL: ${{ secrets.DISMISS_API_URL }}
          DISMISS_TOKEN: ${{ secrets.DISMISS_TOKEN }}
        run: node src/agent.js

      - name: Commit memory file
        run: |
          git config user.name "project-monitor[bot]"
          git config user.email "project-monitor@users.noreply.github.com"
          git add data/seen-suggestions.json
          git diff --staged --quiet || git commit -m "chore: update seen suggestions [skip ci]"
          git push

  notify-failure:
    name: Notifica fallimento via email
    runs-on: ubuntu-latest
    needs: run-monitor
    # Gira SOLO se il job principale è fallito
    if: failure()

    permissions:
      contents: none

    steps:
      - name: Send failure email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"$EMAIL_FROM\",
              \"to\": \"$EMAIL_TO\",
              \"subject\": \"❌ Project Monitor fallito – $(date +'%d/%m/%Y')\",
              \"html\": \"<p>Il workflow notturno ha fallito.</p><p><a href='$RUN_URL'>Vedi i log su GitHub Actions</a></p>\"
            }"