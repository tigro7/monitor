name: 🌙 Nightly Project Monitor

on:
  schedule:
    # Ogni notte in settimana alle 02:00 UTC (04:00 ora italiana in estate, 03:00 in inverno)
    - cron: "0 2 * * 0-4"
  # Permette di lanciarlo manualmente dalla UI di GitHub per testarlo
  workflow_dispatch:

jobs:
  run-monitor:
    name: Analizza progetti e invia report
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    # Permessi necessari per committare il file di memoria
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Usa il token di default per poter fare push
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
 
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          REPO_UFNC: ${{ secrets.REPO_UFNC }}
          REPO_THATSWHOIAM: ${{ secrets.REPO_THATSWHOIAM }}
          REPO_LENUOVEESPRESSIONI: ${{ secrets.REPO_LENUOVEESPRESSIONI }}
          REPO_MONITOR: ${{ github.repository }}

          URL_UFNC: ${{ secrets.URL_UFNC }}
          URL_THATSWHOIAM: ${{ secrets.URL_THATSWHOIAM }}
          URL_LENUOVEESPRESSIONI: ${{ secrets.URL_LENUOVEESPRESSIONI }}

        run: node src/agent.js
 
      - name: Commit memory file
        run: |
          git config user.name "project-monitor[bot]"
          git config user.email "project-monitor@users.noreply.github.com"
          git add data/seen-suggestions.json
          # Committa solo se c'è qualcosa di nuovo
          git diff --staged --quiet || git commit -m "chore: update seen suggestions [skip ci]"
          git push